name: Weekly retrain

# Every Monday at 06:00 UTC — after Sunday's race data lands in FastF1.
# Re-pulls all historical data and retrains the model from scratch so the
# 6-hourly prediction workflow always uses up-to-date race results.

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Restore FastF1 HTTP cache to avoid re-downloading everything from scratch
      - name: Restore FastF1 cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: fastf1-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            fastf1-cache-${{ runner.os }}-

      # Restore prediction history so recap works after retrain
      - name: Restore prediction history
        uses: actions/cache@v4
        with:
          path: model/prediction_history.json
          key: f1-prediction-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            f1-prediction-history-${{ runner.os }}-

      - name: Run pipeline (refresh data + retrain model)
        run: python pipeline.py --refresh --retrain --skip-eda --no-open
        env:
          PYTHONUNBUFFERED: "1"

      # Save updated model to cache so the 6-hourly workflow picks it up
      - name: Save retrained model
        uses: actions/cache/save@v4
        with:
          path: |
            model/xgb_f1_final.json
            model/model_metadata.json
            model/optuna_best_params.json
            model/validation_history.json
            data/processed/
          key: f1-model-${{ hashFiles('src/**.py') }}-${{ github.run_id }}

      # --- Stage HTML for Pages ---
      - name: Prepare publish directory
        run: |
          mkdir -p public
          latest=$(ls -t predictions/*.html 2>/dev/null | head -n 1 || true)
          if [ -z "$latest" ]; then
            echo "No prediction HTML produced — failing"
            exit 1
          fi
          cp "$latest" public/index.html
          cp predictions/*.html public/ 2>/dev/null || true
          ls -la public/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
          commit_message: "Weekly retrain (${{ github.run_id }})"
